%YAML:1.0

######################################## Boards Parameters ###################################################
number_x_square: 8         # squaresX (verified via detection: OpenCV convention)
number_y_square: 7         # squaresY
resolution_x: 800
resolution_y: 700
length_square: 0.12        # square side (m)
length_marker: 0.09        # marker side (m)  -> ratio 0.75
number_board: 1
boards_index: []
square_size: 0.12          # physical square size (m) -> results in meters

############# Boards Parameters for different board size (leave empty if all boards have the same size) #################
number_x_square_per_board: []
number_y_square_per_board: []
square_size_per_board: []

######################################## Camera Parameters ###################################################
distortion_model: 1        # 0:Brown (perspective) // 1: Kannala (fisheye)  <- around-view fisheye
distortion_per_camera : []
number_camera: 1
refine_corner: 1
min_perc_pts: 0.3

cam_params_path: "None"
fix_intrinsic: 0

######################################## Images Parameters ###################################################
root_path: "__DATA_ROOT__/extracted/calib_front_left_20260715_191938"
cam_prefix: "Cam_"
keypoints_path: "None"

######################################## Optimization Parameters #############################################
quaternion_averaging: 1
ransac_threshold: 10
number_iterations: 1000

######################################## Hand-eye method #############################################
he_approach: 0

######################################## Output Parameters ###################################################
save_path: "__DATA_ROOT__/results/front_left"
save_detection: 1
save_reprojection: 1
camera_params_file_name: ""
