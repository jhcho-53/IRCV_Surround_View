%YAML:1.0
number_x_square: 8
number_y_square: 7
resolution_x: 800
resolution_y: 700
length_square: 0.12
length_marker: 0.09
number_board: 1
boards_index: []
square_size: 0.12
number_x_square_per_board: []
number_y_square_per_board: []
square_size_per_board: []

distortion_model: 1
distortion_per_camera : []
number_camera: 7
refine_corner: 1
min_perc_pts: 0.2

# camera_0..camera_6 == Cam_001..Cam_007 (front_left, front_right, side_left_1, side_left_2, side_right_1, side_right_2, rear); camera_7=center ignored
cam_params_path: "__DATA_ROOT__/results/intrinsics_all_cameras.yml"
fix_intrinsic: 0

root_path: "__DATA_ROOT__/extracted/extrinsic_7cam_sync10"
cam_prefix: "Cam_"
keypoints_path: "None"

quaternion_averaging: 1
ransac_threshold: 10
number_iterations: 1000
he_approach: 0

save_path: "__DATA_ROOT__/results/extrinsic_7cam_sync10_refi"
save_detection: 0
save_reprojection: 1
camera_params_file_name: ""
